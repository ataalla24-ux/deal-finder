const categories = [
  { id: "all", name: "Alle", emoji: "🎁" },
  { id: "kaffee", name: "Kaffee", emoji: "☕" },
  { id: "supermarkt", name: "Supermarkt", emoji: "🛒" },
  { id: "essen", name: "Essen", emoji: "🍔" },
  { id: "lieferung", name: "Lieferung", emoji: "🛵" },
  { id: "drogerie", name: "Drogerie", emoji: "🧴" },
  { id: "mode", name: "Mode", emoji: "👗" },
  { id: "tech", name: "Tech", emoji: "📱" },
  { id: "wien", name: "Wien", emoji: "🏛️" },
  { id: "streaming", name: "Streaming", emoji: "🎬" },
  { id: "mobilität", name: "Mobilität", emoji: "🚇" },
  { id: "fitness", name: "Fitness", emoji: "💪" },
  { id: "finanzen", name: "Finanzen", emoji: "💳" },
  { id: "shopping", name: "Shopping", emoji: "🛍️" }
];

let selectedCategory = "all";
let selectedType = "all";
let searchQuery = "";

const $ = id => document.getElementById(id);

function render() {
  // Filter
  const filtered = deals.filter(d => {
    if (selectedCategory !== "all" && d.category !== selectedCategory) return false;
    if (selectedType === "gratis" && d.type !== "gratis") return false;
    if (selectedType === "rabatt" && d.type !== "rabatt") return false;
    if (selectedType === "cashback" && d.type !== "cashback" && d.type !== "testabo") return false;
    if (searchQuery && !`${d.brand} ${d.title} ${d.description}`.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });

  // Counts
  $("countAll").textContent = deals.length;
  $("countGratis").textContent = deals.filter(d => d.type === "gratis").length;
  $("countRabatt").textContent = deals.filter(d => d.type === "rabatt").length;
  $("countCashback").textContent = deals.filter(d => d.type === "cashback" || d.type === "testabo").length;
  $("statusText").textContent = `${deals.length} aktive Deals`;
  $("resultsCount").textContent = `${filtered.length} Deals gefunden`;

  // Categories
  $("categories").innerHTML = categories.map(c => 
    `<button class="category-btn ${selectedCategory === c.id ? 'active' : ''}" data-cat="${c.id}">${c.emoji} ${c.name}</button>`
  ).join('');

  // Deals
  if (filtered.length === 0) {
    $("dealsGrid").style.display = "none";
    $("emptyState").style.display = "block";
  } else {
    $("emptyState").style.display = "none";
    $("dealsGrid").style.display = "grid";
    const types = { gratis: "GRATIS", rabatt: "RABATT", cashback: "CASHBACK", testabo: "GRATIS TESTEN" };
    $("dealsGrid").innerHTML = filtered.map(d => `
      <div class="deal-card">
        ${d.hot ? '<div class="hot-badge">🔥 HOT</div>' : ''}
        <div class="deal-header">
          <div class="deal-brand">
            <div class="brand-logo">${d.logo}</div>
            <div class="brand-info"><h3>${d.brand}</h3><span>${d.source}</span></div>
          </div>
          <span class="deal-type ${d.type}">${types[d.type]}</span>
        </div>
        <h4 class="deal-title">${d.title}</h4>
        <p class="deal-description">${d.description}</p>
        <div class="deal-footer">
          <span class="deal-meta">⏰ ${d.expires}</span>
          <a href="${d.url}" target="_blank" class="deal-link">Zum Deal →</a>
        </div>
      </div>
    `).join('');
  }

  // Event listeners
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.onclick = () => { selectedCategory = btn.dataset.cat; render(); };
  });
}

// Events
$("searchInput").oninput = e => { searchQuery = e.target.value; render(); };
$("filterAll").onclick = () => { selectedType = "all"; updateFilters(); render(); };
$("filterGratis").onclick = () => { selectedType = "gratis"; updateFilters(); render(); };
$("filterRabatt").onclick = () => { selectedType = "rabatt"; updateFilters(); render(); };
$("filterCashback").onclick = () => { selectedType = "cashback"; updateFilters(); render(); };

document.querySelectorAll('.quick-tag').forEach(t => {
  t.onclick = () => { $("searchInput").value = t.dataset.search; searchQuery = t.dataset.search; render(); };
});

function updateFilters() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  $(`filter${selectedType.charAt(0).toUpperCase() + selectedType.slice(1)}`).classList.add('active');
}

render();
</script>
