<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeFinder - Gratis Deals Wien</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f5f5f7; min-height: 100vh; color: #1a1a2e; }
    
    /* Header mit Gradient */
    header {
      background: linear-gradient(135deg, #667eea 0%, #e91e8c 100%);
      padding: 20px 20px 24px;
      color: white;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .logo { font-size: 24px; font-weight: 700; }
    .header-icons { display: flex; gap: 12px; }
    .header-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .header-icon:hover { background: rgba(255,255,255,0.3); }
    
    .location-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.15);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
    }
    .location-bar input {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      flex: 1;
      outline: none;
    }
    .location-bar input::placeholder { color: rgba(255,255,255,0.7); }
    
    .container { max-width: 600px; margin: 0 auto; padding: 0; }
    
    /* Kategorien */
    .categories-wrapper {
      background: white;
      padding: 16px 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .categories {
      display: flex;
      gap: 10px;
      min-width: max-content;
    }
    .cat-btn {
      padding: 10px 18px;
      border-radius: 25px;
      border: 2px solid #e8e8e8;
      background: white;
      color: #555;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .cat-btn:hover { border-color: #a855f7; color: #a855f7; }
    .cat-btn.active {
      background: linear-gradient(135deg, #667eea, #a855f7);
      color: white;
      border-color: transparent;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #eee;
    }
    .tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: #a855f7; }
    .tab.active { color: #a855f7; border-bottom-color: #a855f7; }
    
    /* Deal Cards */
    .deals-list { padding: 12px; }
    
    .deal-card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.2s;
    }
    .deal-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    
    .deal-header {
      display: flex;
      gap: 14px;
      margin-bottom: 12px;
    }
    .deal-logo {
      width: 50px; height: 50px;
      border-radius: 12px;
      background: #f8f8f8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .deal-info { flex: 1; }
    .deal-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .deal-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 2px;
    }
    .deal-brand {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }
    .deal-desc {
      font-size: 14px;
      color: #555;
      line-height: 1.4;
    }
    
    .deal-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .deal-badge.gratis { background: #f0fdf4; color: #16a34a; }
    .deal-badge.limited { background: #fef3c7; color: #d97706; }
    .deal-badge.sample { background: #fce7f3; color: #db2777; }
    .deal-badge.daily { background: #ede9fe; color: #7c3aed; }
    .deal-badge.instore { background: #e0f2fe; color: #0284c7; }
    .badge-check { color: #a855f7; }
    
    .deal-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }
    .deal-meta span { display: flex; align-items: center; gap: 4px; }
    
    .deal-footer {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .deal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #667eea, #a855f7);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .deal-btn:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(168,85,247,0.3); }
    .save-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 2px solid #e8e8e8;
      background: white;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .save-btn:hover { border-color: #a855f7; color: #a855f7; }
    .save-btn.saved { background: #a855f7; border-color: #a855f7; color: white; }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    
    /* Loading */
    .loading { text-align: center; padding: 60px 20px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e8e8e8;
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Status Badge */
    .status-bar {
      background: white;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #888;
      border-bottom: 1px solid #eee;
    }
    .status-live {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #16a34a;
      font-weight: 500;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #16a34a;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Scrollbar */
    .categories-wrapper::-webkit-scrollbar { height: 0; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-top">
        <div class="logo">FreeFinder</div>
        <div class="header-icons">
          <div class="header-icon">🔔</div>
          <div class="header-icon">👤</div>
        </div>
      </div>
      <div class="location-bar">
        <span>📍</span>
        <input type="text" value="Wien, Österreich" readonly>
        <span>📍</span>
      </div>
    </div>
  </header>
  
  <div class="container">
    <div class="categories-wrapper">
      <div class="categories" id="categories"></div>
    </div>
    
    <div class="tabs">
      <div class="tab active" data-tab="all">In der Nähe</div>
      <div class="tab" data-tab="saved">Gespeichert (<span id="savedCount">0</span>)</div>
      <div class="tab" data-tab="used">Eingelöst</div>
    </div>
    
    <div class="status-bar">
      <div class="status-live"><span class="status-dot"></span> <span id="statusText">Lädt...</span></div>
      <div id="lastUpdate">--</div>
    </div>
    
    <div class="deals-list" id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Deals werden geladen...</p>
      </div>
    </div>
  </div>

<script>
// ============================================
// CONFIG
// ============================================
const DEALS_URL = './deals.json';

// ============================================
// STATE
// ============================================
let deals = [];
let savedDeals = JSON.parse(localStorage.getItem('savedDeals') || '[]');
let selectedCategory = 'all';
let selectedTab = 'all';

const categories = [
  { id: 'all', name: 'Alle', emoji: '🎁' },
  { id: 'essen', name: 'Essen', emoji: '🍔' },
  { id: 'kaffee', name: 'Getränke', emoji: '☕' },
  { id: 'drogerie', name: 'Beauty', emoji: '💄' },
  { id: 'supermarkt', name: 'Supermarkt', emoji: '🛒' },
  { id: 'wien', name: 'Kultur', emoji: '🏛️' },
  { id: 'shopping', name: 'Shopping', emoji: '🛍️' },
  { id: 'streaming', name: 'Digital', emoji: '📱' }
];

// ============================================
// DOM
// ============================================
const $ = id => document.getElementById(id);
const content = $('content');
const statusText = $('statusText');
const lastUpdateEl = $('lastUpdate');
const savedCountEl = $('savedCount');
const categoriesEl = $('categories');

// ============================================
// FETCH DEALS
// ============================================
async function fetchDeals() {
  try {
    const res = await fetch(DEALS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('Nicht verfügbar');
    
    const data = await res.json();
    deals = data.deals || [];
    
    statusText.textContent = `${deals.length} Deals live`;
    lastUpdateEl.textContent = new Date().toLocaleTimeString('de-AT', {hour:'2-digit', minute:'2-digit'});
    
    render();
  } catch (err) {
    statusText.textContent = 'Offline';
    if (deals.length === 0) {
      deals = getEmbeddedDeals();
      render();
    }
  }
}

// ============================================
// EMBEDDED DEALS
// ============================================
function getEmbeddedDeals() {
  return [
    { id: "1", brand: "Starbucks", logo: "☕", title: "Gratis Starbucks Getränk", description: "Registriere dich in der App und erhalte ein kostenloses Getränk deiner Wahl", type: "gratis", badge: "instore", category: "kaffee", source: "Starbucks App", url: "https://www.starbucks.at", expires: "31.01.2026", distance: "0.3 km", hot: true },
    { id: "2", brand: "Vapiano", logo: "🍕", title: "Kostenlose Pizza-Slice", description: "Neueröffnung! Heute kostenlose Pizza für die ersten 100 Besucher", type: "gratis", badge: "limited", category: "essen", source: "Vapiano", url: "https://www.vapiano.at", expires: "Heute 18:00", distance: "1.2 km", hot: true, isNew: true },
    { id: "3", brand: "Douglas", logo: "💄", title: "Gratis Gesichtscreme Probe", description: "Hole dir eine kostenlose Probe der neuen Feuchtigkeitscreme ab", type: "gratis", badge: "sample", category: "drogerie", source: "Douglas", url: "https://www.douglas.at", expires: "15.02.2026", distance: "0.8 km", hot: true },
    { id: "4", brand: "Bubbleology", logo: "🧋", title: "Gratis Bubble Tea", description: "Happy Hour: 16-18 Uhr, gratis Small Bubble Tea bei Anmeldung", type: "gratis", badge: "daily", category: "kaffee", source: "Bubbleology", url: "https://www.bubbleology.at", expires: "Täglich", distance: "2.1 km", hot: true },
    { id: "5", brand: "McDonald's", logo: "🍟", title: "Gratis Kaffee", description: "Feedback geben = Gratis Kaffee oder Cola. Bis zu 5x pro Monat!", type: "gratis", badge: "instore", category: "kaffee", source: "McDonald's App", url: "https://www.mcdonalds.at", expires: "5x/Monat", distance: "0.5 km", hot: true },
    { id: "6", brand: "IKEA", logo: "🪑", title: "Gratis Kaffee & Tee", description: "IKEA Family Mitglieder: Unbegrenzt Gratis-Kaffee oder Tee im Restaurant", type: "gratis", badge: "instore", category: "kaffee", source: "IKEA Family", url: "https://www.ikea.at", expires: "Unbegrenzt", distance: "8.5 km", hot: true },
    { id: "7", brand: "jö Bonus Club", logo: "🟡", title: "OMV Winterdrink 1 Ö", description: "Cinnamon Pumpkin Latte oder Blushed Toffee Latte für nur 1 Ö!", type: "gratis", badge: "limited", category: "kaffee", source: "jö App", url: "https://www.joe-club.at", expires: "Winter 2026", distance: "0.2 km", hot: true, isNew: true },
    { id: "8", brand: "dm", logo: "🧴", title: "Gratis Babybox", description: "Für Schwangere: Kostenlose Box mit Babyprodukten bei dm Glückskind", type: "gratis", badge: "sample", category: "drogerie", source: "dm Glückskind", url: "https://www.dm.at", expires: "Bei Anmeldung", distance: "1.0 km", hot: true },
    { id: "9", brand: "Haus der Geschichte", logo: "🏛️", title: "Gratis Eintritt Do 18-20h", description: "Ab 2026 jeden Donnerstagabend kostenloser Eintritt!", type: "gratis", badge: "daily", category: "wien", source: "hdgö", url: "https://www.hdgoe.at", expires: "Jeden Donnerstag", distance: "2.3 km", hot: true, isNew: true },
    { id: "10", brand: "Wien Museum", logo: "🖼️", title: "Gratis unter 19", description: "Freier Eintritt für alle unter 19 Jahren", type: "gratis", badge: "instore", category: "wien", source: "Wien Museum", url: "https://www.wienmuseum.at", expires: "Unbegrenzt", distance: "1.8 km", hot: true },
    { id: "11", brand: "BILLA", logo: "🛒", title: "1+1 Gratis Aktionen", description: "Viele Produkte diese Woche 1+1 Gratis!", type: "gratis", badge: "limited", category: "supermarkt", source: "BILLA", url: "https://www.billa.at", expires: "Diese Woche", distance: "0.4 km", hot: true, isNew: true },
    { id: "12", brand: "Verein MUT", logo: "🥫", title: "Gratis Lebensmittel", description: "Gerettete Lebensmittel kostenlos im 4. Bezirk mit MUT-Karte", type: "gratis", badge: "daily", category: "supermarkt", source: "Verein MUT", url: "https://verein-mut.eu", expires: "Mo-Fr 10-15h", distance: "3.2 km", hot: true }
  ];
}

// ============================================
// RENDER
// ============================================
function render() {
  renderCategories();
  renderDeals();
  savedCountEl.textContent = savedDeals.length;
}

function renderCategories() {
  categoriesEl.innerHTML = categories.map(c => 
    `<button class="cat-btn ${selectedCategory === c.id ? 'active' : ''}" data-cat="${c.id}">${c.emoji} ${c.name}</button>`
  ).join('');
  
  categoriesEl.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = () => { selectedCategory = btn.dataset.cat; render(); };
  });
}

function filterDeals() {
  let filtered = deals;
  
  if (selectedTab === 'saved') {
    filtered = deals.filter(d => savedDeals.includes(d.id));
  } else if (selectedTab === 'used') {
    filtered = [];
  }
  
  if (selectedCategory !== 'all') {
    filtered = filtered.filter(d => d.category === selectedCategory);
  }
  
  return filtered;
}

function renderDeals() {
  const filtered = filterDeals();
  
  if (filtered.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <h3>Keine Deals gefunden</h3>
        <p>Versuche eine andere Kategorie</p>
      </div>`;
    return;
  }
  
  const badgeLabels = {
    gratis: 'Gratis',
    limited: 'Limited',
    sample: 'Sample',
    daily: 'Daily Deal',
    instore: 'In-Store'
  };
  
  content.innerHTML = filtered.map(d => `
    <div class="deal-card">
      <div class="deal-header">
        <div class="deal-logo">${d.logo || '🎁'}</div>
        <div class="deal-info">
          <div class="deal-title-row">
            <div>
              <div class="deal-title">${d.title}</div>
              <div class="deal-brand">${d.brand}</div>
            </div>
            <div class="deal-badge ${d.badge || 'gratis'}">
              ${badgeLabels[d.badge] || 'Gratis'} <span class="badge-check">✓</span>
            </div>
          </div>
          <div class="deal-desc">${d.description}</div>
          <div class="deal-meta">
            <span>📍 ${d.distance || '?'}</span>
            <span>🕐 ${d.expires || 'Begrenzt'}</span>
          </div>
        </div>
      </div>
      <div class="deal-footer">
        <button class="deal-btn" onclick="window.open('${d.url}', '_blank')">Jetzt holen</button>
        <button class="save-btn ${savedDeals.includes(d.id) ? 'saved' : ''}" onclick="toggleSave('${d.id}')">☆</button>
      </div>
    </div>
  `).join('');
}

function toggleSave(id) {
  if (savedDeals.includes(id)) {
    savedDeals = savedDeals.filter(x => x !== id);
  } else {
    savedDeals.push(id);
  }
  localStorage.setItem('savedDeals', JSON.stringify(savedDeals));
  render();
}

// ============================================
// TABS
// ============================================
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    selectedTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render();
  };
});

// ============================================
// INIT
// ============================================
fetchDeals();
setInterval(fetchDeals, 5 * 60 * 1000);
</script>
</body>
</html>
