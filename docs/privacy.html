<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - FreeFinder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1f2937; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 28px; color: #667eea; margin-bottom: 8px; }
        .header p { color: #6b7280; }
        .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card h2 { font-size: 18px; color: #374151; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .card p, .card li { color: #4b5563; margin-bottom: 8px; }
        .card ul { padding-left: 20px; }
        .highlight { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .highlight h2, .highlight p { color: white; }
        .contact { background: #f0fdf4; border: 2px solid #10b981; }
        .footer { text-align: center; margin-top: 40px; color: #9ca3af; font-size: 14px; }
        a { color: #667eea; }
        .link-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; margin-top: 16px; }
        .link-row a { font-weight: 800; }
        .lang-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
        .lang-switch button { border: none; border-radius: 999px; padding: 10px 16px; font-weight: 700; cursor: pointer; background: #e5e7eb; color: #111827; }
        .lang-switch button.active { background: linear-gradient(135deg, #111827, #374151); color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <button id="langDe" onclick="setLanguage('de')">Deutsch</button>
            <button id="langEn" onclick="setLanguage('en')">English</button>
        </div>

        <div class="header">
            <h1>🎁 FreeFinder</h1>
            <p id="pageSubtitle"></p>
        </div>

        <div class="card highlight">
            <h2 id="summaryTitle"></h2>
            <p id="summaryBody"></p>
        </div>

        <div class="card">
            <h2 id="controllerTitle"></h2>
            <p><strong>Stefan Ataalla</strong></p>
            <p id="addressBlock"></p>
            <p><span id="emailLabel"></span> <a href="mailto:dermarollerdesign@gmail.com" id="emailValue"></a></p>
        </div>

        <div class="card">
            <h2 id="localDataTitle"></h2>
            <p id="localIntro"></p>
            <ul id="localList"></ul>
            <p style="margin-top: 12px;"><strong id="localOutro"></strong></p>
        </div>

        <div class="card">
            <h2 id="notCollectedTitle"></h2>
            <ul id="notCollectedList"></ul>
        </div>

        <div class="card">
            <h2 id="externalLinksTitle"></h2>
            <p id="externalLinksBody"></p>
        </div>

        <div class="card">
            <h2 id="cookiesTitle"></h2>
            <p id="cookiesBody"></p>
        </div>

        <div class="card">
            <h2 id="childrenTitle"></h2>
            <p id="childrenBody"></p>
        </div>

        <div class="card">
            <h2 id="changesTitle"></h2>
            <p id="changesBody"></p>
        </div>

        <div class="card">
            <h2 id="rightsTitle"></h2>
            <p id="rightsBody"></p>
        </div>

        <div class="card contact">
            <h2 id="contactTitle"></h2>
            <p id="contactBody"></p>
            <p><strong>Stefan Ataalla</strong><br><span id="contactAddress"></span></p>
            <p><strong id="supportEmailLabel"></strong> <a href="mailto:dermarollerdesign@gmail.com">dermarollerdesign@gmail.com</a></p>
        </div>

        <div class="footer">
            <p id="updatedText"></p>
            <p style="margin-top: 8px;" id="copyrightText"></p>
            <div class="link-row">
                <a href="./support.html" id="supportLink"></a>
                <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" id="termsLink"></a>
                <a href="./index.html" id="backLink"></a>
            </div>
        </div>
    </div>

    <script>

                localList: ['Favoriten, Votes, Ratings, Kommentare und Community-Tipps', 'Einstellungen wie Sprache, Benachrichtigungsstatus und Radius-Filter', 'PRO-Status, Referral-Fortschritt, eingelöste Deals und Spar-Tracker-Daten', 'Selbst eingereichte Links oder Deals sowie technische Cache-Daten für die App'],

                cookiesTitle: '🍪 5. Cookies & Tracking',
                cookiesBody: 'FreeFinder verwendet keine Werbe- oder Analytics-Cookies. Die Web-App nutzt jedoch technischen Browser-/WebView-Speicher (z. B. localStorage, Cache, Service-Worker-Cache), damit Favoriten, Einstellungen und der aktuelle App-Stand erhalten bleiben. Für optionale Funktionen wie Referral, Push oder Admin-Synchronisierung werden außerdem technische Anfragen an FreeFinder-Server bzw. Worker gesendet.',
                childrenTitle: '👶 6. Kinder',

                changesTitle: '🔄 7. Änderungen',
                changesBody: 'Bei Änderungen dieser Datenschutzerklärung wird das Datum unten aktualisiert. Die aktuelle Version ist immer unter dieser URL verfügbar.',
                rightsTitle: '🇪🇺 8. DSGVO-Rechte',

                contactTitle: '📧 9. Kontakt',

                supportEmailLabel: 'Support-E-Mail:',
                updatedText: 'Stand: März 2026',

                summaryTitle: '🔒 Summary',
                summaryBody: '<strong>FreeFinder respects your privacy.</strong> The app stores many usage details locally on your device and only processes the data that is technically needed for optional features.',
                controllerTitle: '📱 1. Controller',
                addressBlock: 'Lotte Hass Weg 2<br>1220 Vienna, Austria',
                emailLabel: 'Email:',
                emailValue: 'dermarollerdesign@gmail.com',

                localIntro: 'FreeFinder stores the following <strong>locally on your device</strong>, for example:',
                localList: ['Favorites, votes, ratings, comments and community tips', 'Settings such as language, notification preferences and nearby radius filters', 'PRO status, referral progress, redeemed deals and savings-tracker data', 'User-submitted links or deals plus technical cache data for the app'],
                localOutro: 'This data generally remains on your device until you delete it or remove the app.',
                notCollectedTitle: '🚫 3. What we do NOT collect',
                notCollectedList: ['No personalized advertising', 'No sale of your data to data brokers', 'No contact lists or photos', 'No third-party ad-network tracking', 'No sensitive health or financial data'],

                changesTitle: '🔄 7. Changes',

                rightsTitle: '🇪🇺 8. GDPR rights',
                rightsBody: 'You can request access, correction or deletion of data processed on the server side. Local app data on your device can be removed by clearing app data or uninstalling the app. For privacy requests, you can email the address below.',

                contactBody: 'If you have questions about this privacy policy:',
                contactAddress: 'Lotte Hass Weg 2, 1220 Vienna<br>Austria',
                supportEmailLabel: 'Support email:',
                updatedText: 'Updated: March 2026',

                supportLink: 'Support',

                backLink: '← Back to app'

        };

        function setLanguage(lang) {
            const copy = I18N[lang] || I18N.de;
            localStorage.setItem('freefinder_language', lang);
            document.documentElement.lang = lang;
            document.getElementById('langDe').classList.toggle('active', lang === 'de');
            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            Object.entries(copy).forEach(([key, value]) => {
                const el = document.getElementById(key);
                if (!el) return;
                if (Array.isArray(value)) el.innerHTML = value.map((item) => `<li>${item}</li>`).join('');
                else el.innerHTML = value;
            });
        }

        const saved = localStorage.getItem('freefinder_language');
        const detected = navigator.language && navigator.language.toLowerCase().startsWith('en') ? 'en' : 'de';
        setLanguage(saved || detected);
    </script>
</body>
</html>
