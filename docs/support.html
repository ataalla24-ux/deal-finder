<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFinder Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            color: #172033;
            line-height: 1.6;
        }
        .container { max-width: 840px; margin: 0 auto; padding: 40px 20px; }
        .hero {
            background: linear-gradient(135deg, #f59e0b, #ef4444 58%, #7c3aed);
            color: white;
            border-radius: 28px;
            padding: 34px 28px;
            margin-bottom: 22px;
            box-shadow: 0 18px 44px rgba(239, 68, 68, 0.18);
        }
        .hero h1 { font-size: clamp(30px, 6vw, 46px); line-height: 1.04; margin-bottom: 10px; }
        .hero p { max-width: 640px; color: rgba(255,255,255,.9); font-size: 18px; }
        .lang-switch { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 16px; }
        .lang-switch button {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            background: #e5e7eb;
            color: #111827;
            font-weight: 800;
            cursor: pointer;
        }
        .lang-switch button.active { background: #111827; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
        .card {
            background: white;
            border: 1px solid rgba(15, 23, 42, .08);
            border-radius: 22px;
            padding: 22px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, .06);
        }
        .card.full { grid-column: 1 / -1; }
        .card h2 { font-size: 19px; margin-bottom: 10px; color: #111827; }
        .card p, .card li { color: #4b5563; margin-bottom: 8px; }
        .card ul { padding-left: 20px; }
        .contact {
            border-color: rgba(16, 185, 129, .35);
            background: linear-gradient(180deg, #ecfdf5, #ffffff);
        }
        a { color: #2563eb; font-weight: 800; }
        .footer { margin-top: 28px; text-align: center; color: #6b7280; font-size: 14px; }
        @media (max-width: 720px) {
            .container { padding: 26px 14px; }
            .grid { grid-template-columns: 1fr; }
            .hero { padding: 28px 22px; }
            .lang-switch { justify-content: center; }
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="lang-switch">
            <button id="langDe" type="button" onclick="setLanguage('de')">Deutsch</button>
            <button id="langEn" type="button" onclick="setLanguage('en')">English</button>
        </div>

        <section class="hero">
            <h1 id="title"></h1>
            <p id="subtitle"></p>
        </section>

        <section class="grid">
            <article class="card contact full">
                <h2 id="contactTitle"></h2>
                <p id="contactBody"></p>
                <p><strong id="emailLabel"></strong> <a href="mailto:dermarollerdesign@gmail.com">dermarollerdesign@gmail.com</a></p>
                <p><strong id="responseLabel"></strong> <span id="responseText"></span></p>
            </article>

            <article class="card">
                <h2 id="helpTitle"></h2>
                <ul id="helpList"></ul>
            </article>

            <article class="card">
                <h2 id="accountTitle"></h2>
                <p id="accountBody"></p>
            </article>

            <article class="card full">
                <h2 id="linksTitle"></h2>
                <p><a href="./privacy.html" id="privacyLink"></a></p>
                <p><a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" id="termsLink"></a></p>
                <p><a href="./data-deletion.html" id="deletionLink"></a></p>
            </article>
        </section>

        <p class="footer">© 2026 FreeFinder · <a href="./index.html" id="backLink"></a></p>
    </main>

    <script>
        const I18N = {
            de: {
                title: 'FreeFinder Support',
                subtitle: 'Hier findest du Hilfe, Kontaktinformationen und rechtliche Links für Fragen zur App.',
                contactTitle: 'Kontakt & Hilfe',
                contactBody: 'Wenn du Fragen hast, einen Fehler melden möchtest oder Unterstützung mit Käufen, Abos, Business-Anzeigen oder Deals brauchst, schreib uns bitte eine E-Mail.',
                emailLabel: 'E-Mail:',
                responseLabel: 'Antwortzeit:',
                responseText: 'Wir antworten in der Regel innerhalb von 1-2 Werktagen.',
                helpTitle: 'Wobei wir helfen können',
                helpList: ['Probleme mit FreeFinder Pro oder Plus', 'Fragen zu In-App-Käufen und Wiederherstellung von Käufen', 'Business-Anzeigen wie Starter Boost, Spotlight Boost und City Push', 'Fehlerberichte, Feedback und Fragen zu Deals'],
                accountTitle: 'Käufe & Abos',
                accountBody: 'In-App-Käufe und Abonnements werden über deine Apple-ID verwaltet. Käufe kannst du in der App über “Käufe wiederherstellen” erneut synchronisieren.',
                linksTitle: 'Wichtige Links',
                privacyLink: 'Privacy Policy / Datenschutzerklärung',
                termsLink: 'Terms of Use (EULA)',
                deletionLink: 'Datenlöschung anfragen',
                backLink: 'Zurück zur App'
            },
            en: {
                title: 'FreeFinder Support',
                subtitle: 'Find help, contact information and legal links for questions about the app.',
                contactTitle: 'Contact & Help',
                contactBody: 'If you have questions, want to report a bug, or need help with purchases, subscriptions, business ads or deals, please email us.',
                emailLabel: 'Email:',
                responseLabel: 'Response time:',
                responseText: 'We usually reply within 1-2 business days.',
                helpTitle: 'What we can help with',
                helpList: ['Issues with FreeFinder Pro or Plus', 'Questions about In-App Purchases and restoring purchases', 'Business ads such as Starter Boost, Spotlight Boost and City Push', 'Bug reports, feedback and deal questions'],
                accountTitle: 'Purchases & Subscriptions',
                accountBody: 'In-App Purchases and subscriptions are managed through your Apple ID. You can sync purchases again in the app by tapping “Restore Purchases”.',
                linksTitle: 'Important Links',
                privacyLink: 'Privacy Policy',
                termsLink: 'Terms of Use (EULA)',
                deletionLink: 'Request data deletion',
                backLink: 'Back to app'
            }
        };

        function setLanguage(lang) {
            const copy = I18N[lang] || I18N.de;
            localStorage.setItem('freefinder_support_language', lang);
            document.documentElement.lang = lang;
            document.getElementById('langDe').classList.toggle('active', lang === 'de');
            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            Object.entries(copy).forEach(([key, value]) => {
                const element = document.getElementById(key);
                if (!element) return;
                element.innerHTML = Array.isArray(value) ? value.map(item => `<li>${item}</li>`).join('') : value;
            });
        }

        const saved = localStorage.getItem('freefinder_support_language');
        const detected = navigator.language && navigator.language.toLowerCase().startsWith('en') ? 'en' : 'de';
        setLanguage(saved || detected);
    </script>
</body>
</html>
