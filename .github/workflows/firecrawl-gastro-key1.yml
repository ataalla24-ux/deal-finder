name: "Firecrawl Key 1 - Gastro"

on:
  schedule:
    - cron: '0 1 * * *' # Start stagger 1: 02:00 Vienna winter / 03:00 summer
  workflow_dispatch:

concurrency:
  group: firecrawl-gastro-key1
  cancel-in-progress: false

jobs:
  gastro:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Run Gastro Scraper
        env:
          FIRECRAWL_API_KEY1: ${{ secrets.FIRECRAWL_API_KEY1 }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scraper/firecrawl-gastro2.js

      - name: Commit deals
        run: |
          node scripts/commit-generated.mjs --message "Gastro2 deals $(date +%Y-%m-%d)" --files docs/deals-pending-gastro2.json
