name: "Firecrawl Gastro Only - Key 1"

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  gastro:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Run Gastro Scraper
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scraper/firecrawl-gastro2.js

      - name: Filter alte Deals
        run: node scraper/filter-old-deals.js

      - name: Commit deals
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-pending-gastro2.json
          git diff --staged --quiet || git commit -m "Gastro2 deals $(date +%Y-%m-%d)"
          git push