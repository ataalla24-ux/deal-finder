name: "Instagram AI Agent"

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/instagram-ai-agent.yml'
      - 'scraper/instagram-ai-agent.js'
      - 'docs/instagram-watchlist.json'
      - 'docs/instagram-ai-seeds.json'
      - 'docs/instagram-merchant-registry.json'
  schedule:
    - cron: '15 1,7,13,19 * * *' # four freshness passes per day
  workflow_dispatch:

concurrency:
  group: deal-pending-writer
  queue: max

permissions:
  contents: write

jobs:
  scan-instagram-ai:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
      TZ: Europe/Vienna
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Run Instagram AI Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          INSTAGRAM_AI_MAX_CANDIDATES: 80
          INSTAGRAM_AI_MAX_PREVIEW_FETCHES: 80
          INSTAGRAM_AI_MAX_RENDER_FETCHES: 80
          INSTAGRAM_AI_MAX_PROFILE_ACCOUNTS: 8
          INSTAGRAM_AI_MAX_PROFILE_POSTS: 4
          INSTAGRAM_AI_MAX_DEALS: 35
          INSTAGRAM_AI_MAX_AGE_DAYS: 7
        run: npm run instagram:ai

      - name: Validate Instagram AI output
        id: validate_instagram_ai
        continue-on-error: true
        run: npm run instagram:ai:validate

      - name: Restore last-good AI source after validation failure
        if: steps.validate_instagram_ai.outcome == 'failure'
        run: git restore --source=HEAD -- docs/deals-pending-instagram-ai.json

      - name: Merge verified Instagram evidence
        if: steps.validate_instagram_ai.outcome == 'success'
        run: node scraper/merge-instagram-pending.js

      - name: Send newly verified Instagram deals to Slack
        if: steps.validate_instagram_ai.outcome == 'success'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PENDING_FILE_NAMES: deals-pending-instagram-verified.json
        run: node scraper/slack-notify.js

      - name: Commit Instagram AI output
        if: always()
        run: |
          node scripts/commit-generated.mjs --message "Instagram AI deals $(date +%Y-%m-%dT%H:%MZ)" --files docs/deals-pending-instagram-ai.json docs/instagram-ai-report.json docs/deals-pending-instagram-verified.json docs/deals-pending-all.json

      - name: Fail workflow when AI output validation failed
        if: steps.validate_instagram_ai.outcome == 'failure'
        run: exit 1
