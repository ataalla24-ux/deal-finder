name: "Firecrawl Daily Sync + Slack"

on:
  schedule:
    - cron: '0 6 * * *' # Morning run: 07:00 Vienna winter / 08:00 summer
    - cron: '0 16 * * *' # Evening run: 17:00 Vienna winter / 18:00 summer
  workflow_dispatch:

concurrency:
  group: firecrawl-daily-sync
  cancel-in-progress: false

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Verify Playwright Chromium
        run: |
          node -e "const { chromium } = require('playwright'); (async()=>{const b=await chromium.launch({headless:true}); await b.close(); console.log('playwright-ok');})().catch(e=>{console.error(e); process.exit(1);});"

      - name: Run Firecrawl Gastro
        env:
          FIRECRAWL_API_KEY1: ${{ secrets.FIRECRAWL_API_KEY1 }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scraper/firecrawl-gastro2.js

      - name: Run Firecrawl Food
        env:
          FIRECRAWL_API_KEY2: ${{ secrets.FIRECRAWL_API_KEY2 }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scraper/firecrawl-food3.js

      - name: Run Firecrawl Consumables
        env:
          FIRECRAWL_API_KEY3: ${{ secrets.FIRECRAWL_API_KEY3 }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scraper/firecrawl-consumables.js

      - name: Run Instagram Discovery Scraper
        env:
          INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
          IG_MAX_AGE_DAYS: 14
          IG_MAX_DEALS: 180
          IG_MAX_POSTS_VISIT: 1400
          IG_MAX_RELATED_ACCOUNTS: 180
          IG_MAX_SOURCES_TOTAL: 300
          IG_SCROLL_ROUNDS: 45
          IG_SCROLL_WAIT_MS: 5000
          IG_STAGNATION_ROUNDS: 10
          IG_PER_SOURCE_LINKS: 500
          IG_MIN_SCORE: 60
          IG_MAX_DEALS_PER_ACCOUNT: 4
        run: node scraper/instagram-discovery-scraper.js

      - name: Run jö Scraper
        run: node scraper/joe-scraper.js

      - name: Filter alte Deals
        run: node scraper/filter-old-deals.js

      - name: Send Daily Digest to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scraper/slack-notify.js

      - name: Commit deal updates
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-pending-gastro2.json docs/deals-pending-food3.json docs/deals-pending-firecrawl2.json docs/deals-pending-instagram.json docs/deals-pending-joe.json docs/deals-pending-all.json docs/sent-deal-ids.json docs/instagram-source-stats.json docs/instagram-discovery-report.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily firecrawl sync $(date +%Y-%m-%d)"
          if ! git pull --rebase --autostash origin main; then
            echo "⚠️ Rebase conflict on generated files. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi
          if ! git push origin HEAD:main; then
            echo "⚠️ Push failed (branch moved). Skipping push for this run."
            exit 0
          fi
