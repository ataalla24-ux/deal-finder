name: "Firecrawl Daily Sync"

on:
  schedule:
    - cron: '0 4 * * *' # Start early so Instagram/jö can finish before 11:00 Vienna digest
  workflow_dispatch:

concurrency:
  group: firecrawl-daily-sync
  cancel-in-progress: false

jobs:
  scrape-and-prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Verify Playwright Chromium
        run: |
          node -e "const { chromium } = require('playwright'); (async()=>{const b=await chromium.launch({headless:true}); await b.close(); console.log('playwright-ok');})().catch(e=>{console.error(e); process.exit(1);});"

      - name: Load jö Auth State
        env:
          JOE_STORAGE_STATE_B64: ${{ secrets.JOE_STORAGE_STATE_B64 }}
        run: node scripts/load-joe-auth-state.mjs

      - name: Build Instagram Merchant Registry
        run: node scraper/build-instagram-merchant-registry.js

      - name: Check Instagram Auth
        id: instagram-auth
        env:
          INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          INSTAGRAM_AUTH_CONTEXT: Firecrawl Daily Sync
          INSTAGRAM_AUTH_CLEAR_PENDING_ON_FAILURE: "1"
          INSTAGRAM_AUTH_CLEAR_MODE: daily-sync
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scripts/check-instagram-auth.mjs

      - name: Run Instagram Daily Sync
        if: steps.instagram-auth.outputs.ok == 'true'
        env:
          INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          IG_MAX_AGE_DAYS: 365
          IG_MAX_DEALS: 800
          IG_MAX_SOURCES_TOTAL: 220
          IG_MAX_TIMELINE_POSTS: 120
          IG_MAX_REGISTRY_ACCOUNTS: 220
          IG_MIN_SCORE: 0
          IG_MAX_DEALS_PER_ACCOUNT: 120
          IG_SOURCE_DELAY_MS: 700
          IG_MAX_RUN_MINUTES: 55
        run: |
          node - <<'NODE'
          const session = String(process.env.INSTAGRAM_SESSIONID || '').trim();
          const rawCookies = String(process.env.INSTAGRAM_COOKIES || '').trim();
          const cookieParts = rawCookies
            ? rawCookies.split(';').map((p) => p.trim()).filter(Boolean)
            : [];
          const cookieNames = cookieParts
            .map((part) => {
              const eq = part.indexOf('=');
              return eq > 0 ? part.slice(0, eq).trim() : '';
            })
            .filter(Boolean);

          console.log(`DEBUG INSTAGRAM_SESSIONID set: ${session ? 'yes' : 'no'}`);
          console.log(`DEBUG INSTAGRAM_COOKIES length: ${rawCookies.length}`);
          console.log(`DEBUG INSTAGRAM_COOKIES parts: ${cookieParts.length}`);
          console.log(`DEBUG INSTAGRAM_COOKIES names: ${cookieNames.join(',') || '(none)'}`);
          NODE
          COOKIE_FILE="$RUNNER_TEMP/instagram-cookies.txt"
          printf '%s\n' "$INSTAGRAM_COOKIES" > "$COOKIE_FILE"
          if [ -n "$INSTAGRAM_SESSIONID" ] && ! grep -q 'sessionid=' "$COOKIE_FILE"; then
            printf '; sessionid=%s\n' "$INSTAGRAM_SESSIONID" >> "$COOKIE_FILE"
          fi
          export INSTAGRAM_COOKIES_FILE="$COOKIE_FILE"
          node scraper/instagram-daily-sync.js

      - name: Run jö Scraper
        run: node scraper/joe-scraper.js

      - name: Run Vienna Promo Radar
        run: node scraper/vienna-promo-radar.js

      - name: Commit deal updates
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-pending-instagram.json docs/deals-pending-instagram-web.json docs/deals-pending-instagram-discovery.json docs/deals-pending-joe.json docs/deals-pending-vienna-promo-radar.json docs/instagram-source-stats.json docs/instagram-discovery-report.json docs/instagram-web-report.json docs/instagram-merchant-registry.json docs/instagram-auth-health.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily sync sources $(date +%Y-%m-%d)"
          if ! git pull --rebase --autostash origin main; then
            echo "⚠️ Rebase conflict on generated files. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi
          if ! git push origin HEAD:main; then
            echo "⚠️ Push failed (branch moved). Skipping push for this run."
            exit 0
          fi
