name: "Smart Summary"

on:
  schedule:
    - cron: '20 5 * * *' # Refresh live deal copy before the midday validation/digest window
  workflow_dispatch:

concurrency:
  group: smart-summary
  cancel-in-progress: false

jobs:
  smart-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Dependencies
        run: npm ci

      - name: Run Smart Summary
        run: node scraper/smart-summary.js

      - name: Reapply persistent live edits
        run: node scripts/apply-live-deal-edits.mjs

      - name: Cache brand logos
        run: npm run logos:cache
      
      - name: Commit live deal summaries
        run: |
          node scripts/commit-generated.mjs --message "Improve live deal summaries $(date +%Y-%m-%d)" --files docs/deals.json docs/live-deal-edit-report.json
