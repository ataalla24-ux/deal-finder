name: "Flights Vienna Scraper"

on:
  schedule:
    - cron: '0 7 * * 1' # Weekly on Monday, aligned with the early-morning digest window
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Scrape cheap roundtrip flights from Vienna
        env:
          KIWI_API_KEY: ${{ secrets.KIWI_API_KEY }}
        run: node scraper/flights-vienna-scraper.js

      - name: Commit pending flight deals
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-pending-flights.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Flights Vienna deals"
          if ! git pull --rebase --autostash origin main; then
            echo "⚠️ Rebase conflict on generated files. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi
          if ! git push origin HEAD:main; then
            echo "⚠️ Push failed (branch moved). Skipping push for this run."
            exit 0
          fi
