name: "Power Scraper"

on:
  schedule:
    - cron: '30 5 * * *' # Curated morning refresh before the daily digest window
  workflow_dispatch:

concurrency:
  group: power-scraper
  cancel-in-progress: false

jobs:
  scrape-power:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Run Power Scraper
        env:
          POWER_INCLUDE_BASE_DEALS: '0'
        run: node scraper/power-scraper.js

      - name: Commit pending power deals
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-pending-power.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Refresh power deals $(date +%Y-%m-%d)"
          if ! git pull --rebase --autostash origin main; then
            echo "⚠️ Rebase conflict on generated files. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi
          if ! git push origin HEAD:main; then
            echo "⚠️ Push failed (branch moved). Skipping push for this run."
            exit 0
          fi
