name: "Power Scraper"

on:
  schedule:
    - cron: '30 5 * * *' # Curated morning refresh before the daily digest window
  workflow_dispatch:

concurrency:
  group: power-scraper
  cancel-in-progress: false

jobs:
  scrape-power:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Run Power Scraper
        env:
          POWER_INCLUDE_BASE_DEALS: '0'
        run: node scraper/power-scraper.js

      - name: Commit pending power deals
        run: |
          node scripts/commit-generated.mjs --message "Refresh power deals $(date +%Y-%m-%d)" --files docs/deals-pending-power.json
