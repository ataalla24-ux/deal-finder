name: "⛪ Churches Wien Scraper"

on:
  schedule:
    - cron: '0 7 * * 1'  # Wöchentlich montags 07:00 Uhr
  workflow_dispatch:

jobs:
  churches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: deal-finder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Church Scraper
        working-directory: deal-finder
        run: python3 wien_deals/church_scraper.py

      - name: Commit deals
        working-directory: deal-finder
        run: |
          node scripts/commit-generated.mjs --message "Churches Wien $(date +%Y-%m-%d)" --files docs/deals-pending-church-*.json
