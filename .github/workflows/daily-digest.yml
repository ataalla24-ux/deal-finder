name: "Daily Deal Digest"
# Runs once per day after the scheduled scanners have finished.
# Collects the finished pending files and sends ONE Slack digest.

on:
  schedule:
    - cron: '0 10 * * *' # 11:00 Vienna winter / 12:00 summer
  workflow_dispatch:

concurrency:
  group: deal-pending-writer
  queue: max

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Build Deal Source Health
        run: node scraper/build-deal-source-health.js

      - name: Send Daily Digest to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scraper/slack-notify.js

      - name: Commit digest state
        if: always()
        run: |
          node scripts/commit-generated.mjs --message "Daily digest state $(date +%Y-%m-%d)" --files docs/deals-pending-all.json docs/deal-candidates-index.json docs/deal-source-health.json docs/deal-validity-report.json
