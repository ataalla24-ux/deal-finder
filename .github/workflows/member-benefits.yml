name: "Member Benefits Scraper"

on:
  schedule:
    - cron: '20 5 * * *'
  workflow_dispatch:

concurrency:
  group: member-benefits-scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Scrape member benefit deals
        run: node scraper/member-benefits-scraper.js

      - name: Commit member benefit state
        run: |
          node scripts/commit-generated.mjs --message "Member benefits deals $(date +%Y-%m-%d)" --files docs/deals-pending-member-benefits.json
