name: "Deploy Apify Instagram Actor"

on:
  push:
    branches:
      - main
    paths:
      - 'apify/instagram-vienna-food-offers/**'
      - '.github/workflows/deploy-apify-instagram-actor.yml'
  workflow_dispatch:

concurrency:
  group: deploy-apify-instagram-vienna-actor
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test Actor source
        working-directory: apify/instagram-vienna-food-offers
        run: |
          npm ci
          npm run check

      - name: Set up authenticated Apify CLI
        uses: apify/setup-apify-cli-action@v1
        with:
          token: ${{ secrets.APIFY_TOKEN }}

      - name: Push and build the configured Actor
        working-directory: apify/instagram-vienna-food-offers
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_VIENNA_ACTOR_ID }}
        run: apify push "$ACTOR_ID" --build-tag=latest --force --wait-for-finish=1800
