name: "TikTok Deal Scanner"

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

concurrency:
  group: tiktok-deal-scanner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan-and-notify:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
      TIKTOK_MAX_AGE_DAYS: 7
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Scan current TikTok deals
        run: node scraper/tiktok-deals-scanner.js

      - name: Send TikTok deals to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PENDING_FILE_NAMES: deals-pending-tiktok.json
        run: node scraper/slack-notify.js

      - name: Commit TikTok scanner state
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-pending-tiktok.json docs/tiktok-scanner-report.json docs/deals-pending-all.json docs/deal-candidates-index.json docs/deal-validity-report.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "TikTok deals $(date +%Y-%m-%d)"
          if ! git pull --rebase --autostash origin main; then
            echo "⚠️ Rebase conflict on generated files. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi
          if ! git push origin HEAD:main; then
            echo "⚠️ Push failed (branch moved). Skipping push for this run."
            exit 0
          fi
