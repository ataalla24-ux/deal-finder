name: "TikTok Deal Scanner"

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

concurrency:
  group: tiktok-deal-scanner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan-and-notify:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
      TIKTOK_MAX_AGE_DAYS: 7
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Scan current TikTok deals
        run: node scraper/tiktok-deals-scanner.js

      - name: Commit TikTok scanner state
        run: |
          node scripts/commit-generated.mjs --message "TikTok deals $(date +%Y-%m-%d)" --files docs/deals-pending-tiktok.json docs/tiktok-scanner-report.json
