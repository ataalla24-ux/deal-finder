name: "TikTok Deal Scanner"

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

concurrency:
  group: deal-pending-all-queue
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan-and-notify:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
      TIKTOK_MAX_AGE_DAYS: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Scan current TikTok deals
        run: node scraper/tiktok-deals-scanner.js

      - name: Send fresh TikTok deals to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PENDING_FILE_NAMES: deals-pending-tiktok.json
        run: node scraper/slack-notify.js

      - name: Commit TikTok scanner state
        run: |
          node scripts/commit-generated.mjs --message "TikTok deals $(date +%Y-%m-%d)" --files docs/deals-pending-tiktok.json docs/tiktok-scanner-report.json docs/deals-pending-all.json docs/deal-validity-report.json
