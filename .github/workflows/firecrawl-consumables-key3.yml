name: "Firecrawl Key 3 - Consumables"

on:
  schedule:
    - cron: '0 3 * * *' # Start stagger 3: 04:00 Vienna winter / 05:00 summer
  workflow_dispatch:

concurrency:
  group: firecrawl-consumables-key3
  cancel-in-progress: false

jobs:
  consumables:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Run Consumables Scraper
        env:
          FIRECRAWL_API_KEY3: ${{ secrets.FIRECRAWL_API_KEY3 }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          FC3_MAX_AGE_DAYS: 365
          FIRECRAWL_POST_VERIFY_MAX: 30
          FIRECRAWL_POST_VERIFY_MAX_AGE_DAYS: 45
          FIRECRAWL_POST_VERIFY_CONCURRENCY: 4
          FIRECRAWL_POST_VERIFY_TIMEOUT_MS: 6000
        run: node scraper/firecrawl-consumables.js

      - name: Commit deals
        run: |
          node scripts/commit-generated.mjs --message "Consumables deals $(date +%Y-%m-%d)" --files docs/deals-pending-firecrawl2.json
