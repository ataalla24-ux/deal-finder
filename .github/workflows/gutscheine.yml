name: "Gutscheine.at Scraper"

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape Gutscheine.at
        run: node scraper/gutscheine-scraper.js

      - name: Commit pending deals
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-pending-gutscheine.json
          git diff --staged --quiet || git commit -m "Gutscheine.at Deals"
          git push