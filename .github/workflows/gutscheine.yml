name: "Gutscheine.at Scraper"

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Scrape Gutscheine.at
        run: node scraper/gutscheine-scraper.js

      - name: Commit pending deals
        run: |
          node scripts/commit-generated.mjs --message "Gutscheine.at Deals" --files docs/deals-pending-gutscheine.json
