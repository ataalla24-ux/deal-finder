name: "Firecrawl Key 5 - Instagram Gastro"

on:
  schedule:
    - cron: '0 4 * * *' # Start stagger 4: 05:00 Vienna winter / 06:00 summer
  workflow_dispatch:

concurrency:
  group: firecrawl-instagram-key5
  cancel-in-progress: false

jobs:
  instagram-gastro:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Run Instagram Gastro Scraper
        env:
          FIRECRAWL_API_KEY5: ${{ secrets.FIRECRAWL_API_KEY5 }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          FC5_MAX_AGE_DAYS: 365
          FIRECRAWL_POST_VERIFY_MAX: 30
          FIRECRAWL_POST_VERIFY_MAX_AGE_DAYS: 45
          FIRECRAWL_POST_VERIFY_CONCURRENCY: 4
          FIRECRAWL_POST_VERIFY_TIMEOUT_MS: 6000
        run: node scraper/firecrawl-instagram-gastro5.js

      - name: Commit deals
        run: |
          node scripts/commit-generated.mjs --message "Firecrawl5 deals $(date +%Y-%m-%d)" --files docs/deals-pending-firecrawl5.json
