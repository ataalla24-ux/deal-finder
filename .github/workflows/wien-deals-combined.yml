name: "Wien Deals Combined"

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  web-scraper:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
      PLAYWRIGHT_HEADLESS: 1
      WIEN_DEALS_COMBINED_MAX_DEALS: 100
      WIEN_DEALS_COMBINED_REVIEW_VALIDITY_DAYS: 14
    steps:
      - uses: actions/checkout@v4
        with:
          path: deal-finder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright beautifulsoup4 requests
          python -m playwright install --with-deps chromium

      - name: Run Web Scraper
        working-directory: deal-finder
        run: python3 wien_deals/scrape_timestamps.py

      - name: Commit deals
        working-directory: deal-finder
        run: |
          node scripts/commit-generated.mjs --message "Deals $(date +%Y-%m-%d)" --files docs/deals-*.json docs/wien-deals-combined-report.json
