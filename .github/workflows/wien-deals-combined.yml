name: "Wien Deals Combined"

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  web-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: deal-finder

      - name: Install Python deps
        run: pip3 install --user playwright beautifulsoup4 requests

      - name: Run Web Scraper
        working-directory: deal-finder
        run: python3 wien_deals/timestamp_scraper.py

      - name: Commit deals
        working-directory: deal-finder
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-*.json
          git diff --staged --quiet || git commit -m "Deals $(date +%Y-%m-%d)"
          git push
