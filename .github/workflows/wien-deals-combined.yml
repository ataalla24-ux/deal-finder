name: "Wien Deals Combined"

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  web-scraper:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
      PLAYWRIGHT_HEADLESS: 1
    steps:
      - uses: actions/checkout@v4
        with:
          path: deal-finder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright beautifulsoup4 requests
          python -m playwright install --with-deps chromium

      - name: Run Web Scraper
        working-directory: deal-finder
        run: python3 wien_deals/scrape_timestamps.py

      - name: Commit deals
        working-directory: deal-finder
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-*.json
          git diff --staged --quiet || git commit -m "Deals $(date +%Y-%m-%d)"
          git push
