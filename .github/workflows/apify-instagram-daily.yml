name: "Apify Instagram Daily"

on:
  schedule:
    - cron: '20 3 * * *'
  workflow_dispatch:

concurrency:
  group: apify-instagram-daily
  cancel-in-progress: false

jobs:
  scrape-apify-instagram:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Check Instagram Auth
        id: instagram-auth
        env:
          INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          APIFY_INSTAGRAM_VIENNA_ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_VIENNA_ACTOR_ID }}
          INSTAGRAM_AUTH_CONTEXT: Apify Instagram Daily
          INSTAGRAM_AUTH_CLEAR_PENDING_ON_FAILURE: "1"
          INSTAGRAM_AUTH_CLEAR_MODE: apify
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scripts/check-instagram-auth.mjs

      - name: Run Apify Instagram Import
        if: steps.instagram-auth.outputs.ok == 'true'
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_INSTAGRAM_VIENNA_ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_VIENNA_ACTOR_ID }}
          APIFY_INSTAGRAM_COOKIE_STRING: ${{ secrets.INSTAGRAM_COOKIES }}
          APIFY_INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
        run: node scraper/import-apify-instagram-deals.js

      - name: Commit Apify Instagram updates
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-pending-instagram-apify.json docs/apify-instagram-report.json docs/instagram-auth-health.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Apify Instagram sync $(date +%Y-%m-%d)"
          if ! git pull --rebase --autostash origin main; then
            echo "⚠️ Rebase conflict on generated files. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi
          if ! git push origin HEAD:main; then
            echo "⚠️ Push failed (branch moved). Skipping push for this run."
            exit 0
          fi
