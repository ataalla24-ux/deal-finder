name: "Apify Instagram Daily"

on:
  schedule:
    - cron: '40 3 * * *'
  workflow_dispatch:

concurrency:
  group: apify-instagram-daily
  cancel-in-progress: false

jobs:
  scrape-apify-instagram:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Check Instagram Auth
        id: instagram-auth
        env:
          INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          APIFY_INSTAGRAM_VIENNA_ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_VIENNA_ACTOR_ID }}
          INSTAGRAM_AUTH_CONTEXT: Apify Instagram Daily
          INSTAGRAM_AUTH_TEST_USERNAME: ciosgrill
          INSTAGRAM_AUTH_ATTEMPTS: "3"
          INSTAGRAM_AUTH_BACKOFF_MS: "60000"
          INSTAGRAM_AUTH_CLEAR_PENDING_ON_FAILURE: "0"
          INSTAGRAM_AUTH_CLEAR_MODE: apify
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scripts/check-instagram-auth.mjs

      - name: Run Apify Instagram Import
        # A 429 only proves that the lightweight probe was throttled. The
        # actor has its own retry/session handling, so do not turn a healthy
        # cookie into a full-day zero-result outage.
        if: steps.instagram-auth.outputs.proceed == 'true'
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_INSTAGRAM_VIENNA_ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_VIENNA_ACTOR_ID }}
          APIFY_INSTAGRAM_COOKIE_STRING: ${{ secrets.INSTAGRAM_COOKIES }}
          APIFY_INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
        run: node scraper/import-apify-instagram-deals.js

      - name: Commit Apify Instagram updates
        run: |
          node scripts/commit-generated.mjs --message "Apify Instagram sync $(date +%Y-%m-%d)" --files docs/deals-pending-instagram-apify.json docs/apify-instagram-report.json docs/instagram-auth-health.json
