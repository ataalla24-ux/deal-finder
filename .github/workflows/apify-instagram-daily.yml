name: "Apify Instagram Daily"

on:
  schedule:
    - cron: '40 3 * * *'
  workflow_dispatch:

concurrency:
  group: apify-instagram-daily
  cancel-in-progress: false

jobs:
  scrape-apify-instagram:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Check Instagram Auth
        id: instagram-auth
        env:
          INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          APIFY_INSTAGRAM_VIENNA_ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_VIENNA_ACTOR_ID }}
          INSTAGRAM_AUTH_CONTEXT: Apify Instagram Daily
          INSTAGRAM_AUTH_TEST_USERNAME: ciosgrill
          INSTAGRAM_AUTH_ATTEMPTS: "3"
          INSTAGRAM_AUTH_BACKOFF_MS: "60000"
          INSTAGRAM_AUTH_CLEAR_PENDING_ON_FAILURE: "0"
          INSTAGRAM_AUTH_CLEAR_MODE: apify
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scripts/check-instagram-auth.mjs

      - name: Install Apify CLI
        run: npm install -g apify-cli@latest

      - name: Deploy Apify Instagram Actor
        timeout-minutes: 15
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_INSTAGRAM_VIENNA_ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_VIENNA_ACTOR_ID }}
          CI: "true"
          APIFY_CLI_DISABLE_TELEMETRY: "1"
        run: |
          apify login --token "$APIFY_TOKEN"
          apify push "$APIFY_INSTAGRAM_VIENNA_ACTOR_ID" --dir apify/instagram-vienna-food-offers --force --wait-for-finish=600 --json

      - name: Run Apify Instagram Import
        if: steps.instagram-auth.outputs.ok == 'true' || steps.instagram-auth.outputs.status == 'rate-limited'
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_INSTAGRAM_VIENNA_ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_VIENNA_ACTOR_ID }}
          APIFY_INSTAGRAM_COOKIE_STRING: ${{ secrets.INSTAGRAM_COOKIES }}
          APIFY_INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
          APIFY_INSTAGRAM_MAX_SEED_ACCOUNTS: 70
          APIFY_INSTAGRAM_MAX_SEED_POST_URLS: 120
          APIFY_INSTAGRAM_MAX_POSTS_PER_SOURCE: 12
          APIFY_INSTAGRAM_MAX_POSTS_TO_INSPECT: 320
        run: node scraper/import-apify-instagram-deals.js

      - name: Merge Instagram outputs
        run: npm run instagram:merge

      - name: Commit Apify Instagram updates
        run: |
          node scripts/commit-generated.mjs --message "Apify Instagram sync $(date +%Y-%m-%d)" --files docs/deals-pending-instagram-apify.json docs/apify-instagram-report.json docs/instagram-auth-health.json docs/deals-pending-instagram.json
