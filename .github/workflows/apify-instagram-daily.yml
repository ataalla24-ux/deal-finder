name: "Apify Instagram Fresh Scan"

on:
  schedule:
    - cron: '40 */6 * * *'
  workflow_dispatch:

concurrency:
  group: deal-pending-writer
  queue: max

jobs:
  scrape-apify-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Test Instagram reliability guards
        run: |
          node scripts/test-instagram-auth-reliability.mjs
          node scripts/test-apify-instagram-reliability.mjs

      - name: Run Apify Instagram Import
        id: apify-import
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_INSTAGRAM_VIENNA_ACTOR_ID: ${{ secrets.APIFY_INSTAGRAM_VIENNA_ACTOR_ID }}
          APIFY_INSTAGRAM_COOKIE_STRING: ${{ secrets.INSTAGRAM_COOKIES }}
          APIFY_INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
          APIFY_INSTAGRAM_SHARD_INDEX: ${{ github.run_number }}
          APIFY_INSTAGRAM_ACCOUNT_SHARDS: "4"
          APIFY_INSTAGRAM_HOT_ACCOUNT_COUNT: "6"
          APIFY_INSTAGRAM_MAX_ACCOUNTS: "24"
          APIFY_INSTAGRAM_MAX_HASHTAGS: "6"
          APIFY_INSTAGRAM_POSTS_PER_SOURCE: "9"
          APIFY_INSTAGRAM_MAX_POSTS_TO_INSPECT: "120"
          APIFY_INSTAGRAM_MAX_POST_AGE_DAYS: "7"
          APIFY_INSTAGRAM_MAX_AGE_WITHOUT_EXPLICIT_VALIDITY_DAYS: "3"
          APIFY_INSTAGRAM_UNKNOWN_EXPIRY_TTL_HOURS: "72"
        run: node scraper/import-apify-instagram-deals.js

      - name: Merge verified Instagram evidence
        run: node scraper/merge-instagram-pending.js

      - name: Send newly verified Instagram deals to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PENDING_FILE_NAMES: deals-pending-instagram-verified.json
        run: node scraper/slack-notify.js

      - name: Commit Apify Instagram updates
        if: always()
        run: |
          node scripts/commit-generated.mjs --message "Apify Instagram sync $(date +%Y-%m-%dT%H:%MZ)" --files docs/deals-pending-instagram-apify.json docs/apify-instagram-report.json docs/deals-pending-instagram-verified.json docs/deals-pending-all.json
