name: "Instagram Cookie Refresh (Manual)"

on:
  workflow_dispatch:
    inputs:
      refresh_reason:
        description: "Reason for rotating the session (manual, login-wall, invalid-session, blocked)"
        required: true
        default: "manual"
        type: string

concurrency:
  group: instagram-cookie-refresh
  cancel-in-progress: false

jobs:
  refresh-instagram-cookies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Refresh Instagram Cookies
        id: refresh
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          INSTAGRAM_TOTP_SECRET: ${{ secrets.INSTAGRAM_TOTP_SECRET }}
          INSTAGRAM_EMAIL_CODE: ${{ secrets.INSTAGRAM_EMAIL_CODE }}
          INSTAGRAM_COOKIE_REFRESH_REASON: ${{ inputs.refresh_reason }}
          INSTAGRAM_AUTH_TEST_USERNAME: instagram
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_USER_ID: ${{ secrets.GMAIL_USER_ID || 'me' }}
          GMAIL_INSTAGRAM_CODE_QUERY: ${{ secrets.GMAIL_INSTAGRAM_CODE_QUERY }}
          GMAIL_INSTAGRAM_CODE_POLL_TIMEOUT_MS: 90000
          GMAIL_INSTAGRAM_CODE_POLL_INTERVAL_MS: 5000
        run: node scripts/refresh-instagram-cookies.mjs

      - name: Update GitHub Secrets
        if: steps.refresh.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_PAT }}
          COOKIE_PATH: ${{ steps.refresh.outputs.cookies_path }}
          SESSIONID_PATH: ${{ steps.refresh.outputs.sessionid_path }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_SECRETS_PAT fehlt. Lege einen Fine-grained PAT mit Repository Secrets write permission an."
            exit 1
          fi
          gh secret set INSTAGRAM_COOKIES < "$COOKIE_PATH"
          gh secret set INSTAGRAM_SESSIONID < "$SESSIONID_PATH"
          echo "Instagram cookie secrets updated."

      - name: Notify Slack on refresh failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          REFRESH_STATUS: ${{ steps.refresh.outputs.status }}
          SHOULD_RETRY_LOGIN: ${{ steps.refresh.outputs.should_retry_login }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_CHANNEL_ID" ]; then
            echo "Slack secrets missing; skip notification."
            exit 0
          fi
          node - <<'NODE'
          const status = process.env.REFRESH_STATUS || 'failed';
          const text = status === 'rate-limited'
            ? '⏳ *Instagram Cookie Refresh rate-limited*\\nInstagram hat den Login vorübergehend gedrosselt. Keine Cookies rotieren; nach dem Cooldown manuell erneut versuchen.'
            : process.env.SHOULD_RETRY_LOGIN === 'true'
              ? '⚠️ *Instagram Cookie Refresh fehlgeschlagen*\\nDie Session ist ungültig oder Instagram verlangt eine Challenge. Bitte Login/2FA/Challenge prüfen.'
              : `⚠️ *Instagram Cookie Refresh technisch fehlgeschlagen*\\nStatus: ${status}. Die vorhandenen Cookies wurden nicht ersetzt.`;
          const response = await fetch('https://slack.com/api/chat.postMessage', {
            method: 'POST',
            headers: {
              Authorization: `Bearer ${process.env.SLACK_BOT_TOKEN}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ channel: process.env.SLACK_CHANNEL_ID, text }),
          });
          const data = await response.json();
          if (!data.ok) {
            console.error(`Slack notification failed: ${data.error || 'unknown_error'}`);
            process.exit(1);
          }
          NODE
