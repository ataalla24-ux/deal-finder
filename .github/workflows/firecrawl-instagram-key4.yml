name: "Firecrawl Key 4 - Instagram Direct"

on:
  schedule:
    - cron: '0 0 * * *' # Start stagger 0: 01:00 Vienna winter / 02:00 summer
  workflow_dispatch:

concurrency:
  group: firecrawl-instagram-key4
  cancel-in-progress: false

jobs:
  instagram-direct:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Run Instagram Direct Scraper
        env:
          FIRECRAWL_API_KEY4: ${{ secrets.FIRECRAWL_API_KEY4 }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          FC4_MAX_AGE_DAYS: 365
          FIRECRAWL_POST_VERIFY_MAX: 40
          FIRECRAWL_POST_VERIFY_MAX_AGE_DAYS: 45
          FIRECRAWL_POST_VERIFY_CONCURRENCY: 4
          FIRECRAWL_POST_VERIFY_TIMEOUT_MS: 6000
        run: node scraper/firecrawl-instagram-direct4.js

      - name: Commit deals
        run: |
          node scripts/commit-generated.mjs --message "Firecrawl4 deals $(date +%Y-%m-%d)" --files docs/deals-pending-firecrawl4.json
