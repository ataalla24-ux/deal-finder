name: ✅ Approve Deals from Slack

on:
  schedule:
    - cron: '*/15 * * * *' # fallback polling if Slack Events miss a reaction
  workflow_dispatch:
    inputs:
      slack_channel:
        description: 'Slack channel that received the approval reaction'
        required: false
      message_ts:
        description: 'Slack message timestamp to approve immediately'
        required: false
      reaction:
        description: 'Slack approval reaction name'
        required: false
      reaction_user:
        description: 'Slack user who added the approval reaction'
        required: false

concurrency:
  group: deal-pending-all-queue
  cancel-in-progress: false

jobs:
  approve-deals:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: ✅ Read Slack ✅ Reactions & Approve
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          APPROVE_SLACK_CHANNEL_ID: ${{ github.event.inputs.slack_channel }}
          APPROVE_SLACK_MESSAGE_TS: ${{ github.event.inputs.message_ts }}
          APPROVE_SLACK_REACTION: ${{ github.event.inputs.reaction }}
          APPROVE_SLACK_REACTION_USER: ${{ github.event.inputs.reaction_user }}
          APPROVE_FULL_SCAN_MAX_THREADS: '24'
          APPROVE_FULL_SCAN_MAX_DEALS: '500'
          PENDING_QUEUE_TTL_DAYS: '14'
          LIVE_DEAL_REMOVALS_ENABLED: '0'
        run: node scraper/slack-approve.js

      - name: 🧼 Normalize Live Deals After Approvals
        env:
          MAX_LIVE_URL_HEALTH_CHECKS: '90'
          MAX_LIVE_URL_EXPIRY_REFRESHES: '60'
          MAX_LIVE_CONTENT_ENRICHMENTS: '40'
          LIVE_DEAL_VALIDATION_APPLY: '0'
          LIVE_DEAL_REMOVALS_ENABLED: '0'
        run: node scraper/normalize-live-deals.js

      - name: ✏️ Reapply persistent live edits
        env:
          LIVE_DEAL_REMOVALS_ENABLED: '0'
        run: node scripts/apply-live-deal-edits.mjs

      - name: 🖼️ Cache brand logos
        run: npm run logos:cache

      - name: 📤 Push Approved Deals
        run: |
          DEAL_COUNT=$(cat docs/deals.json | python3 -c "import sys, json; print(json.load(sys.stdin)['totalDeals'])" 2>/dev/null || echo "?")
          TIMESTAMP=$(date -u +"%H:%M")
          node scripts/commit-generated.mjs --message "✅ ${TIMESTAMP} - Genehmigte Deals (${DEAL_COUNT} total)" --files docs/deals.json docs/deals-pending-all.json docs/live-deal-validation-report.json docs/live-deal-review-candidates.json docs/live-deal-edit-report.json
