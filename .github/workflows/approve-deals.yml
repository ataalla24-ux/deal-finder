name: ✅ Approve Deals from Slack

on:
  schedule:
    - cron: '5 * * * *' # stündlich, Minute 5
  workflow_dispatch:

jobs:
  approve-deals:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: ✅ Read Slack ✅ Reactions & Approve
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scraper/slack-approve.js

      - name: 🧼 Normalize Live Deals After Approvals
        env:
          MAX_LIVE_URL_HEALTH_CHECKS: '90'
          MAX_LIVE_URL_EXPIRY_REFRESHES: '60'
          MAX_LIVE_CONTENT_ENRICHMENTS: '40'
        run: node scraper/normalize-live-deals.js

      - name: 📤 Push Approved Deals
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/deals.json docs/deals-pending-all.json docs/live-deal-validation-report.json 2>/dev/null || true
          DEAL_COUNT=$(cat docs/deals.json | python3 -c "import sys, json; print(json.load(sys.stdin)['totalDeals'])" 2>/dev/null || echo "?")
          TIMESTAMP=$(date -u +"%H:%M")
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "✅ ${TIMESTAMP} - Genehmigte Deals (${DEAL_COUNT} total)"
          if ! git pull --rebase --autostash origin main; then
            echo "⚠️ Rebase conflict on generated files. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi
          if ! git push origin HEAD:main; then
            echo "⚠️ Push failed (branch moved). Skipping push for this run."
            exit 0
          fi
