name: "Freikirchen Wien"

on:
  # Manual only: the canonical Churches Wien workflow runs once per week.
  workflow_dispatch:

jobs:
  freikirchen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: deal-finder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Freikirchen Scraper
        working-directory: deal-finder
        run: python3 wien_deals/freikirchen_scraper.py

      - name: Commit deals
        working-directory: deal-finder
        run: |
          node scripts/commit-generated.mjs --message "Freikirchen Wien $(date +%Y-%m-%d)" --files docs/deals-pending-freikirchen.json
