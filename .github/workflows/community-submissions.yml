name: "Community Deal Intake"

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: deal-pending-writer
  queue: max

jobs:
  intake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch community submissions
        env:
          COMMUNITY_SYNC_TOKEN: ${{ secrets.COMMUNITY_SYNC_TOKEN }}
        run: node scraper/fetch-community-submissions.js

      - name: Send community submissions to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PENDING_FILE_NAMES: deals-pending-community.json
        run: node scraper/slack-notify.js

      - name: Mark community submissions as queued
        env:
          COMMUNITY_SYNC_TOKEN: ${{ secrets.COMMUNITY_SYNC_TOKEN }}
        run: node scraper/ack-community-submissions.js

      - name: Commit queue state
        if: always()
        run: |
          node scripts/commit-generated.mjs --message "Community intake state $(date +%Y-%m-%d-%H%M)" --files docs/deals-pending-community.json docs/deals-pending-all.json
