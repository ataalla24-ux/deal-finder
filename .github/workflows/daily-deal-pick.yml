name: "Featured Deal Picks"
# Runs repeatedly after the digest window, so later Slack replies are picked up too.
# Reply to the Slack digest thread with:
# - "deal 3" or "3" for Deal des Tages
# - "woche 3" / "Wochendeal 3" / "week 3" for Deal der Woche

on:
  schedule:
    - cron: '*/15 11-21 * * *'
  workflow_dispatch:

jobs:
  pick-daily-deal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Pick featured deals from Slack replies
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          FEATURED_WEEKLY_LLM_REQUIRED: ${{ vars.FEATURED_WEEKLY_LLM_REQUIRED }}
        run: node scraper/set-daily-deal.js

      - name: Commit featured deal files
        run: |
          node scripts/commit-generated.mjs --message "🏆 Featured deals gesetzt" --files docs/deal-of-the-day.json docs/deal-of-the-week.json
