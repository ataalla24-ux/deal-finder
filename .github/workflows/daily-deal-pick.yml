name: "Featured Deal Picks"
# Runs at 13:30 Vienna (12:30 UTC) – 30 min AFTER approve at 13:00
# Reply to the Slack digest thread with:
# - "deal 3" or "3" for Deal des Tages
# - "woche 3" / "week 3" for Deal der Woche

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  pick-daily-deal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Pick featured deals from Slack replies
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scraper/set-daily-deal.js

      - name: Commit featured deal files
        run: |
          node scripts/commit-generated.mjs --message "🏆 Featured deals gesetzt" --files docs/deal-of-the-day.json docs/deal-of-the-week.json
