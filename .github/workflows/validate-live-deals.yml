name: "Validate Live Deals"

on:
  schedule:
    - cron: '30 8 * * *' # 09:30 Vienna winter / 10:30 Vienna summer
  workflow_dispatch:

concurrency:
  group: validate-live-deals
  cancel-in-progress: false

jobs:
  validate-live-deals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Live Deals
        env:
          MAX_LIVE_URL_HEALTH_CHECKS: 0
          MAX_LIVE_URL_EXPIRY_REFRESHES: 0
          MAX_LIVE_CONTENT_ENRICHMENTS: 0
          MAX_LIVE_SOCIAL_POST_AGE_DAYS: 7
          LIVE_DEAL_VALIDATION_APPLY: '0'
          URL_CHECK_TIMEOUT_MS: 7000
        run: node scraper/normalize-live-deals.js

      - name: LLM review live feed
        if: ${{ vars.ENABLE_LIVE_DEAL_LLM_REVIEW == '1' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          DEAL_REVIEW_APPLY: '0'
          DEAL_REVIEW_MAX_DEALS: '160'
          DEAL_REVIEW_CHUNK_SIZE: '24'
          DEAL_REVIEW_MIN_REMOVE_CONFIDENCE: '0.86'
          DEAL_REVIEW_TARGET_EVIDENCE: '1'
          DEAL_REVIEW_TARGET_CONCURRENCY: '8'
          DEAL_REVIEW_TARGET_TIMEOUT_MS: '7000'
          DEAL_REVIEW_TARGET_TEXT_CHARS: '900'
        run: node scripts/review-live-deals-llm.mjs

      - name: Write disabled LLM review report
        if: ${{ vars.ENABLE_LIVE_DEAL_LLM_REVIEW != '1' }}
        run: node scripts/write-disabled-live-deal-llm-report.mjs

      - name: Reapply persistent live edits
        run: node scripts/apply-live-deal-edits.mjs

      - name: Cache brand logos
        run: npm run logos:cache

      - name: Commit validated live deals
        run: |
          node scripts/commit-generated.mjs --message "Validate live deals $(date +%Y-%m-%d)" --files docs/deals.json docs/live-deal-validation-report.json docs/live-deal-review-candidates.json docs/live-deal-llm-review.json docs/live-deal-edit-report.json
