name: "Validate Live Deals"

on:
  schedule:
    - cron: '30 8 * * *' # 09:30 Vienna winter / 10:30 Vienna summer
  workflow_dispatch:

concurrency:
  group: validate-live-deals
  cancel-in-progress: false

jobs:
  validate-live-deals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Live Deals
        env:
          MAX_LIVE_URL_HEALTH_CHECKS: 0
          MAX_LIVE_URL_EXPIRY_REFRESHES: 0
          MAX_LIVE_CONTENT_ENRICHMENTS: 0
          URL_CHECK_TIMEOUT_MS: 7000
        run: node scraper/normalize-live-deals.js

      - name: Commit validated live deals
        run: |
          node scripts/commit-generated.mjs --message "Validate live deals $(date +%Y-%m-%d)" --files docs/deals.json docs/live-deal-validation-report.json docs/live-deal-review-candidates.json
