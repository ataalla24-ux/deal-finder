name: Mega Scrape Wien Deals

on:
  schedule:
    - cron: '*/30 * * * *'  # Alle 30 Minuten
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run Mega Scraper
        run: node scraper/power-scraper.js
        continue-on-error: true
      
      - name: Move to docs
        run: mv deals.json docs/deals.json 2>/dev/null || true
      
            - name: Commit & Force Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Auto update deals" || echo "Nothing to commit"

          git fetch origin main
          git reset --hard origin/main

          git add .
          git commit -m "Auto update deals" || echo "Nothing to commit"

          git push --force
