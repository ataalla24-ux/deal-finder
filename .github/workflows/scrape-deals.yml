name: Mega Scrape Wien Deals
on:
  schedule:
    - cron: '*/30 * * * *'  # Alle 30 Minuten
  workflow_dispatch:
  push:
    branches: [main]

# Prevent concurrent runs from conflicting
concurrency:
  group: scrape-deals
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run Mega Scraper
        run: node scraper/power-scraper.js
        continue-on-error: true
      
      - name: Move to docs
        run: mv deals.json docs/deals.json 2>/dev/null || true
      
      - name: Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🔄 Deals Update - ${{ github.run_number }}'
          file_pattern: 'docs/deals.json'
          commit_user_name: Deal Bot
          commit_user_email: bot@github.com
          skip_dirty_check: false
          skip_fetch: false
          skip_checkout: false
          disable_globbing: false
          create_branch: false
