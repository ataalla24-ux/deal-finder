name: Scrape Wien Deals

on:
  # Alle 2 Stunden automatisch
  schedule:
    - cron: '0 */2 * * *'
  
  # Manuell ausführen
  workflow_dispatch:
  
  # Bei Push
  push:
    branches: [main]
    paths:
      - 'scraper/**'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 🔍 Run Deal Scraper
        run: node scraper/deal-scraper.js
        continue-on-error: true
      
      - name: 📦 Move to docs
        run: |
          mkdir -p docs
          mv deals.json docs/deals.json || true
      
      - name: 📤 Commit & Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/deals.json || true
          git diff --staged --quiet || git commit -m "🔄 Update Deals - $(date +'%Y-%m-%d %H:%M')"
          git push || true
