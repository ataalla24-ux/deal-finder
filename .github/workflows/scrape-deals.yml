name: Scrape Deals

on:
  # Alle 2 Stunden automatisch ausführen
  schedule:
    - cron: '0 */2 * * *'
  
  # Manuell ausführen können
  workflow_dispatch:
  
  # Bei Push auf main
  push:
    branches:
      - main
    paths:
      - 'scraper/**'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 🔍 Run deal scraper
        run: node scraper/deal-scraper.js
      
      - name: 📦 Move deals.json to docs folder
        run: |
          mkdir -p docs
          mv deals.json docs/deals.json
      
      - name: 📤 Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/deals.json
          git diff --staged --quiet || git commit -m "🔄 Update deals - $(date +'%Y-%m-%d %H:%M')"
          git push
