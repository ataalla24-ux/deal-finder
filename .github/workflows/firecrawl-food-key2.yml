name: "Firecrawl Food Only - Key 2"

on:
  schedule:
    - cron: '0 2 * * *' # Start stagger 2: 03:00 Vienna winter / 04:00 summer
  workflow_dispatch:

concurrency:
  group: firecrawl-food-key2
  cancel-in-progress: false

jobs:
  food:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Run Food Scraper
        env:
          FIRECRAWL_API_KEY2: ${{ secrets.FIRECRAWL_API_KEY2 }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scraper/firecrawl-food3.js

      - name: Filter alte Deals
        run: node scraper/filter-old-deals.js

      - name: Commit deals
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@freefinder.wien"
          git add docs/deals-pending-food3.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Food3 deals $(date +%Y-%m-%d)"
          if ! git pull --rebase --autostash origin main; then
            echo "⚠️ Rebase conflict on generated files. Skipping push for this run."
            git rebase --abort || true
            exit 0
          fi
          if ! git push origin HEAD:main; then
            echo "⚠️ Push failed (branch moved). Skipping push for this run."
            exit 0
          fi
